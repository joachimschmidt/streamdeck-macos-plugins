<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
    <rect width="144" height="144" rx="28" fill="#1a1a2e"/>

    <!-- Header -->
    <circle cx="18" cy="16" r="5" fill="#D4A574"/>
    <text x="28" y="20" font-family="-apple-system,Helvetica" font-size="11" font-weight="600" fill="#ddd">Claude</text>

    <!-- Status badge -->
    <rect x="103" y="8" width="33" height="16" rx="4" fill="#FFA726" opacity="0.25"/>
    <text x="140" y="20" font-family="-apple-system,Helvetica" font-size="9" font-weight="700" fill="#FFA726" text-anchor="end">MED</text>

    <!-- 5h utilization: big number -->
    <text x="72" y="50" font-family="-apple-system,Helvetica" font-size="26" font-weight="700" fill="#FFA726" text-anchor="middle">38%</text>
    <text x="72" y="63" font-family="-apple-system,Helvetica" font-size="9" fill="#888" text-anchor="middle">5h window</text>

    <!-- 5h progress bar -->
    <defs>
      <clipPath id="b5"><rect x="16" y="70" width="112" height="10" rx="5"/></clipPath>
      <clipPath id="b7"><rect x="16" y="100" width="112" height="8" rx="4"/></clipPath>
    </defs>
    <rect x="16" y="70" width="112" height="10" rx="5" fill="#333"/>
    <rect x="16" y="70" width="43" height="10" fill="#FFA726" clip-path="url(#b5)"/>

    <!-- 7d bar -->
    <text x="16" y="96" font-family="-apple-system,Helvetica" font-size="9" fill="#666">7d</text>
    <text x="128" y="96" font-family="-apple-system,Helvetica" font-size="9" fill="#4CAF50" text-anchor="end">14%</text>
    <rect x="16" y="100" width="112" height="8" rx="4" fill="#333"/>
    <rect x="16" y="100" width="16" height="8" fill="#4CAF50" clip-path="url(#b7)"/>

    <!-- Bottom: reset time -->
    <text x="16" y="125" font-family="-apple-system,Helvetica" font-size="9" fill="#666">resets</text>
    <text x="16" y="137" font-family="-apple-system,Helvetica" font-size="11" font-weight="600" fill="#aaa">15:00</text>

    <text x="72" y="125" font-family="-apple-system,Helvetica" font-size="9" fill="#666" text-anchor="middle">in</text>
    <text x="72" y="137" font-family="-apple-system,Helvetica" font-size="11" font-weight="600" fill="#aaa" text-anchor="middle">54m</text>

    <text x="128" y="125" font-family="-apple-system,Helvetica" font-size="9" fill="#666" text-anchor="end">claim</text>
    <text x="128" y="137" font-family="-apple-system,Helvetica" font-size="9" font-weight="600" fill="#aaa" text-anchor="end">5h</text>
</svg>