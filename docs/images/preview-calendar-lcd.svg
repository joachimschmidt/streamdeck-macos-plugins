<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="28" fill="#1a1a2e"/>
  <!-- Calendar color bar -->
  <rect x="0" y="0" width="6" height="144" rx="3" fill="#4FC3F7"/>
  <!-- Time -->
  <text x="16" y="28" font-family="-apple-system,Helvetica" font-size="18" font-weight="700" fill="#FFA726">10:30 AM</text>
  <!-- Nav -->
  <text x="132" y="22" font-family="-apple-system,Helvetica" font-size="11" fill="#666" text-anchor="end">2/5</text>
  <!-- Title -->
  <text x="16" y="56" font-family="-apple-system,Helvetica" font-size="16" font-weight="600" fill="#EEEEEE">Team Standup</text>
  <!-- Calendar name -->
  <text x="16" y="76" font-family="-apple-system,Helvetica" font-size="11" fill="#777">Work</text>
  <!-- Time until -->
  <text x="16" y="100" font-family="-apple-system,Helvetica" font-size="13" fill="#AAAAAA">in 12 min</text>
  <!-- Meeting hint -->
  <text x="72" y="128" font-family="-apple-system,Helvetica" font-size="11" fill="#66BB6A" text-anchor="middle">Hold to join meeting</text>
</svg>